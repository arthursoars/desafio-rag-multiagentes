services:
  # Serviço de inferência local de IA
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu] # Usa GPU dedicada para o Ollama
    networks:
      - rag_network

  # Serviço da aplicação Python
  backend:
    build: .
    container_name: rag-backend
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - ollama
    networks:
      - rag_network

volumes:
  ollama_data:

networks:
  rag_network:
    driver: bridge